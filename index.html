<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behavior Engine</title>
  <link rel="stylesheet" href="/src/styles/global.css" />
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <span class="titlebar-title">Behavior Engine</span>
      <div class="titlebar-controls">
        <button id="btn-minimize">─</button>
        <button id="btn-maximize">□</button>
        <button id="btn-close">✕</button>
      </div>
    </div>
    <div id="layout">
      <nav id="sidebar">
        <div class="sidebar-brand">BE</div>
        <ul class="nav-links">
          <li class="nav-item active" data-view="dashboard">
            <span class="nav-icon">⬡</span><span class="nav-label">Dashboard</span>
          </li>
          <li class="nav-item" data-view="tasks">
            <span class="nav-icon">☑</span><span class="nav-label">Tasks</span>
          </li>
          <li class="nav-item" data-view="settings">
            <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
          </li>
        </ul>
        <div id="mode-badge" class="mode-badge mode-normal">NORMAL</div>
      </nav>
      <main id="main-panel">
        <div id="view-dashboard" class="view active"></div>
        <div id="view-tasks"     class="view"></div>
        <div id="view-settings"  class="view"></div>
      </main>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
